<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Bradford's Pokédex 🌈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff7675, #74b9ff, #55efc4, #ffeaa7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 36px;
            text-shadow: 3px 3px 0px #2d3436;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Search & Filter Controls */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: white;
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 50px;
            outline: none;
            background: #f1f2f6;
        }

        button.search-btn {
            background: #ff7675;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(255, 118, 117, 0.4);
        }

        button.search-btn:active {
            transform: scale(0.95);
        }

        /* Big Special Menu Button for A-Z View */
        .az-toggle-btn {
            background: #6c5ce7;
            color: white;
            border: 4px solid white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .az-toggle-btn:hover {
            transform: translateY(-2px);
            background: #5b4cc4;
        }

        /* Alphabet Menu Drawer */
        .az-menu-box {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            display: none;
            border: 4px solid #6c5ce7;
        }

        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .letter-btn {
            background: #f1f2f6;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #2d3436;
            transition: all 0.1s ease;
        }

        .letter-btn.active {
            background: #6c5ce7;
            color: white;
            transform: scale(1.15);
        }

        .pokemon-results-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f5f6fa;
            border-radius: 16px;
        }

        .list-poke-badge {
            background: white;
            border: 2px solid #b2bec3;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            text-transform: capitalize;
            cursor: pointer;
            font-weight: 600;
        }

        .list-poke-badge:hover {
            border-color: #6c5ce7;
            background: #e8f4f8;
        }

        /* Quick Pick Buttons for Easy Tapping */
        .quick-picks {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .quick-btn {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: capitalize;
            transition: all 0.2s ease;
        }

        .quick-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Pokédex Display Card */
        .pokedex-card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            border: 8px solid #fff;
            transition: all 0.3s ease;
        }

        .poke-image-container {
            background: #f1f2f6;
            border-radius: 24px;
            padding: 10px;
            margin-bottom: 15px;
            display: inline-block;
            width: 100%;
        }

        .poke-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .poke-name {
            font-size: 32px;
            text-transform: capitalize;
            color: #2d3436;
            margin: 10px 0 5px 0;
        }

        /* Type Badges */
        .type-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .type-badge {
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Kid-friendly Type Palette */
        .normal { background-color: #95afc0; }
        .fire { background-color: #ff7675; }
        .water { background-color: #74b9ff; }
        .electric { background-color: #f9ca24; color: #2d3436; }
        .grass { background-color: #2ed573; }
        .ice { background-color: #7ed6df; }
        .fighting { background-color: #e55039; }
        .poison { background-color: #a55eea; }
        .ground { background-color: #d4a373; }
        .flying { background-color: #a8c0ff; }
        .psychic { background-color: #ff7979; }
        .bug { background-color: #badc58; }
        .rock { background-color: #9c88ff; }
        .ghost { background-color: #8c7ae6; }
        .dragon { background-color: #240b36; }
        .steel { background-color: #dcdde1; }
        .fairy { background-color: #ffb8b8; }

        /* Special Move Layout */
        .feature-box {
            background: #fff3cd;
            border: 3px dashed #ffc107;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .feature-label {
            font-size: 13px;
            text-transform: uppercase;
            color: #b7791f;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .move-name {
            font-size: 24px;
            color: #e15f41;
            font-weight: bold;
            text-transform: capitalize;
        }

        /* Evolution Tracker Section */
        .evolution-box {
            background: #f1f2f6;
            border-radius: 20px;
            padding: 15px;
        }

        .evolution-title {
            font-size: 14px;
            color: #747d8c;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .evo-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        #evo-from, #evo-to {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        /* Visual Thumbnail Badge Config */
        .evo-badge {
            background: white;
            border: 2px solid #e1b12c;
            padding: 4px 14px 4px 6px;
            border-radius: 50px;
            font-size: 15px;
            text-transform: capitalize;
            color: #2c3a47;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .evo-badge:hover {
            background: #ffeaa7;
            transform: scale(1.05);
        }

        .evo-thumb {
            width: 36px;
            height: 36px;
            object-fit: contain;
            background: #f1f2f6;
            border-radius: 50%;
            padding: 2px;
        }

        .evo-empty {
            color: #a4b0be;
            font-style: italic;
            font-size: 14px;
            display: inline-block;
            padding: 6px 0;
        }

        /* Loading Animation Container */
        .loading-overlay {
            display: none;
            font-size: 18px;
            color: #2d3436;
            font-weight: bold;
            margin: 20px 0;
        }

        .pokeball-spinner {
            width: 50px;
            height: 50px;
            background: linear-gradient(to bottom, #ff4757 50%, white 50%);
            border-radius: 50%;
            border: 4px solid #2d3436;
            position: relative;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        .pokeball-spinner::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border: 4px solid #2d3436;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌈 Bradford's Pokédex 🌈</h1>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Type a Pokémon name..." autocomplete="off">
        <button class="search-btn" onclick="handleSearch()">Go! 🚀</button>
    </div>

    <button class="az-toggle-btn" onclick="toggleAlphabetMenu()">📖 Open Alphabet Book</button>

    <div id="az-menu" class="az-menu-box">
        <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #6c5ce7;">Pick a letter to find Pokémon!</div>
        <div class="letter-grid" id="alphabet-letters"></div>
        <div class="pokemon-results-list" id="alphabet-pokemon-results">
            <span style="color: #a4b0be; font-style: italic; font-size: 14px; margin: auto;">Tap a letter above!</span>
        </div>
    </div>

    <div class="quick-picks">
        <button class="quick-btn" onclick="loadPokedex('pikachu')">⚡ Pikachu</button>
        <button class="quick-btn" onclick="loadPokedex('charizard')">🔥 Charizard</button>
        <button class="quick-btn" onclick="loadPokedex('blastoise')">💧 Blastoise</button>
        <button class="quick-btn" onclick="loadPokedex('bulbasaur')">🌿 Bulbasaur</button>
        <button class="quick-btn" onclick="loadPokedex('eevee')">📦 Eevee</button>
    </div>

    <div id="loading" class="loading-overlay">
        <div class="pokeball-spinner"></div>
        Finding Pokémon...
    </div>

    <div class="pokedex-card" id="pokedex-card" style="display: none;">
        <div class="card-content">
            <div class="poke-image-container">
                <img id="poke-img" class="poke-image" src="" alt="Pokemon">
            </div>

            <h2 id="poke-name" class="poke-name">Pokémon</h2>
            
            <div id="poke-types" class="type-container"></div>

            <div class="feature-box">
                <div class="feature-label">✨ Super Special Move ✨</div>
                <div id="poke-move" class="move-name">Ultimate Attack</div>
            </div>

            <div class="evolution-box">
                <div class="evolution-title">🧬 Evolution Family</div>
                <div class="evo-row">
                    <div>
                        <span style="font-size:13px; color:#747d8c; display:block; text-align: center;">Evolves From:</span>
                        <div id="evo-from"></div>
                    </div>
                    <div style="margin-top: 6px;">
                        <span style="font-size:13px; color:#747d8c; display:block; text-align: center;">Evolves Into:</span>
                        <div id="evo-to"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const typeEmojis = {
    fire: '🔥', water: '💧', grass: '🌿', electric: '⚡', normal: '⭐',
    ice: '❄️', fighting: '🥊', poison: '🧪', ground: '⏳', flying: '🍃',
    psychic: '🔮', bug: '🐛', rock: '🪨', ghost: '👻', dragon: '🐉',
    steel: '⚙️', fairy: '✨'
};

let globalPokemonMasterList = [];

async function initializeAlphabetIndex() {
    try {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const data = await res.json();
        
        globalPokemonMasterList = data.results
            .map(p => p.name)
            .filter(name => !name.includes('-')) 
            .sort((a, b) => a.localeCompare(b));

        buildAlphabetButtons();
    } catch (e) {
        console.error("Could not build directory menu", e);
    }
}

function buildAlphabetButtons() {
    const lettersContainer = document.getElementById('alphabet-letters');
    lettersContainer.innerHTML = '';
    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    
    alphabet.forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'letter-btn';
        btn.innerText = letter;
        btn.onclick = () => showPokemonForLetter(letter, btn);
        lettersContainer.appendChild(btn);
    });
}

function showPokemonForLetter(letter, clickedButton) {
    document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
    clickedButton.classList.add('active');

    const resultsContainer = document.getElementById('alphabet-pokemon-results');
    resultsContainer.innerHTML = '';

    const filteredList = globalPokemonMasterList.filter(name => 
        name.toUpperCase().startsWith(letter)
    );

    if(filteredList.length === 0) {
        resultsContainer.innerHTML = '<span style="font-size:14px; color:#a4b0be; margin:auto;">No Pokémon found!</span>';
        return;
    }

    filteredList.forEach(name => {
        const badge = document.createElement('span');
        badge.className = 'list-poke-badge';
        badge.innerText = name;
        badge.onclick = () => {
            document.getElementById('search-input').value = name;
            loadPokedex(name);
            toggleAlphabetMenu(); 
        };
        resultsContainer.appendChild(badge);
    });
}

function toggleAlphabetMenu() {
    const menu = document.getElementById('az-menu');
    const toggleBtn = document.querySelector('.az-toggle-btn');
    if (menu.style.display === 'block') {
        menu.style.display = 'none';
        toggleBtn.innerText = "📖 Open Alphabet Book";
    } else {
        menu.style.display = 'block';
        toggleBtn.innerText = "📕 Close Alphabet Book";
    }
}

async function loadPokedex(name) {
    if (!name) return;
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('pokedex-card').style.display = 'none';

    try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase().trim()}`);
        if (!response.ok) throw new Error("Not found");
        const data = await response.json();

        document.getElementById('poke-name').innerText = data.name;
        
        const officialArtwork = data.sprites.other['official-artwork'].front_default;
        const fallbackSprite = data.sprites.front_default;
        document.getElementById('poke-img').src = officialArtwork || fallbackSprite || '';

        const typesContainer = document.getElementById('poke-types');
        typesContainer.innerHTML = '';
        
        data.types.forEach(t => {
            const typeName = t.type.name;
            const emoji = typeEmojis[typeName] || '👾';
            const badge = document.createElement('span');
            badge.className = `type-badge ${typeName}`;
            badge.innerHTML = `${emoji} ${typeName}`;
            typesContainer.appendChild(badge);
        });

        const levelUpMoves = [];
        data.moves.forEach(m => {
            const levelDetails = m.version_group_details.find(detail => 
                detail.move_learn_method.name === 'level-up'
            );
            if (levelDetails) {
                levelUpMoves.push({
                    name: m.move.name.replace(/-/g, ' '),
                    level: levelDetails.level_learned_at
                });
            }
        });
        
        levelUpMoves.sort((a, b) => b.level - a.level);
        const signatureMove = levelUpMoves.length > 0 ? levelUpMoves[0].name : "Tackle";
        document.getElementById('poke-move').innerText = signatureMove;

        const speciesResponse = await fetch(data.species.url);
        const speciesData = await speciesResponse.json();
        
        const evoResponse = await fetch(speciesData.evolution_chain.url);
        const evoData = await evoResponse.json();

        renderEvolutionChain(evoData.chain, data.name);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('pokedex-card').style.display = 'block';

    } catch (err) {
        console.error(err);
        document.getElementById('loading').style.display = 'none';
        alert("Oops! Could not find that Pokémon. Let's try spelling it again! 🌈");
    }
}

function renderEvolutionChain(chain, currentName) {
    let fromElement = document.getElementById('evo-from');
    let toElement = document.getElementById('evo-to');
    
    fromElement.innerHTML = '';
    toElement.innerHTML = '';

    let ancestralTrack = null;
    let descendentTrack = [];
    const searchTarget = currentName.toLowerCase();
    let layer1_root = chain.species.name;

    if (layer1_root === searchTarget) {
        if (chain.evolves_to.length > 0) {
            descendentTrack = chain.evolves_to.map(e => e.species.name);
        }
    } else {
        for (let branch of chain.evolves_to) {
            let layer2_name = branch.species.name;
            
            if (layer2_name === searchTarget) {
                ancestralTrack = layer1_root;
                if (branch.evolves_to.length > 0) {
                    descendentTrack = branch.evolves_to.map(e => e.species.name);
                }
                break;
            }
            
            let layer3_match = branch.evolves_to.find(leaf => leaf.species.name === searchTarget);
            if (layer3_match) {
                ancestralTrack = layer2_name;
                break;
            }
        }
    }

    if (ancestralTrack) {
        fromElement.appendChild(createEvoBadge(ancestralTrack));
    } else {
        fromElement.innerHTML = '<span class="evo-empty">First Form! No parents 🐣</span>';
    }

    if (descendentTrack.length > 0) {
        descendentTrack.forEach(name => {
            toElement.appendChild(createEvoBadge(name));
        });
    } else {
        toElement.innerHTML = '<span class="evo-empty">Final Form! Max Level 🚀</span>';
    }
}

// Generates an interactive horizontal badge with an asynchronous profile picture pipeline
function createEvoBadge(name) {
    const badge = document.createElement('div');
    badge.className = 'evo-badge';
    
    const img = document.createElement('img');
    img.className = 'evo-thumb';
    // Transparent spacer placeholder background until api callback clears
    img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; 
    
    const text = document.createElement('span');
    text.innerText = name;
    
    badge.appendChild(img);
    badge.appendChild(text);
    
    badge.onclick = () => {
        document.getElementById('search-input').value = name;
        loadPokedex(name);
    };
    
    // Asynchronously fetch sprite picture directly into the element shell 
    fetch(`https://pokeapi.co/api/v2/pokemon/${name}`)
        .then(res => res.json())
        .then(data => {
            const sprite = data.sprites.front_default || data.sprites.other['official-artwork'].front_default;
            if (sprite) img.src = sprite;
        })
        .catch(err => console.error("Thumbnail load skipped:", err));
        
    return badge;
}

function handleSearch() {
    const val = document.getElementById('search-input').value;
    if (val) loadPokedex(val);
}

document.getElementById('search-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        handleSearch();
    }
});

initializeAlphabetIndex();
loadPokedex('pikachu');
</script>

</body>
</html>
